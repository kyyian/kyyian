<title>KYYIAN</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;

radial-gradient(circle at center,

}

.links{

.links a:hover{
background:#76ff76;

.section{
padding:100px 20px;
max-width:900px;

.section h2{
font-size:38px;
margin-bottom:20px;
color:#a7ff8a;
}

.music-card{
padding:20px;
border:1px solid #333;
border-radius:20px;

footer{
